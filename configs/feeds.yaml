version: 1
description: >
  Sources RSS/feeds agrégées par SecJournal. Éditez ce fichier pour
  ajouter, retirer ou désactiver un flux — AUCUNE recompilation nécessaire.
  Repli sur la liste intégrée si ce fichier est absent ou invalide.

# Champs : id (unique) · label · theme · url · [ftype] · [enabled: false] · [weight: 1.0]
# theme ∈ CVE, Exploit, Threat, News-EN, News-FR, Outils, CTF
# weight : multiplicateur de score de fraicheur (>1 = source premium temps reel)

feeds:
  # ── CVE & Vulnérabilités ──
  - id:    "nvd-rss"
    label: "NVD (NIST)"
    theme: "CVE"
    url:   "https://nvd.nist.gov/feeds/xml/cve/misc/nvd-rss.xml"
  - id:    "cvefeed-high"
    label: "CVEFeed HIGH/CRIT"
    theme: "CVE"
    url:   "https://cvefeed.io/rssfeed/severity/high.xml"
  - id:    "cvefeed-latest"
    label: "CVEFeed Latest"
    theme: "CVE"
    url:   "https://cvefeed.io/rssfeed/latest.xml"
  - id:    "cvealert"
    label: "CVE Alert"
    theme: "CVE"
    url:   "https://cvealert.net/feeds/rss2/"
  - id:    "cert-fr"
    label: "CERT-FR (ANSSI)"
    theme: "CVE"
    url:   "https://www.cert.ssi.gouv.fr/feed/"
  - id:    "cisa-kev"
