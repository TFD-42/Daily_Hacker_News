version: 1
description: >
  Sources RSS/feeds agrégées par SecJournal / Daily Hacker News. Éditez ce
  fichier pour ajouter, retirer ou désactiver un flux — AUCUNE recompilation
  nécessaire. Repli sur la liste intégrée si ce fichier est absent ou invalide.

# Champs : id (unique) · label · theme · url · [ftype] · [enabled: false] · [weight: 1.0]
# theme  ∈ CVE, Exploit, Threat, News-EN, News-FR, News-CN, Outils, CTF
# weight : multiplicateur de score de fraicheur (>1 = source premium temps reel)
# ftype  : "rss" (défaut), "json_kev" (CISA KEV format), "gh_md" (parse a GitHub README)
#
# Diagnostic : `python3 scripts/secjournal.py --verify-feeds` probe chaque URL
# et classe les feeds en ok / quiet / dead. Utilise-le après avoir édité.

feeds:
