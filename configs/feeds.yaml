version: 1
description: >
  Sources RSS/feeds agrégées par SecJournal. Éditez ce fichier pour
  ajouter, retirer ou désactiver un flux — AUCUNE recompilation nécessaire.
  Repli sur la liste intégrée si ce fichier est absent ou invalide.

# Champs : id (unique) · label · theme · url · [ftype] · [enabled: false]
# theme ∈ CVE, Exploit, News-EN, News-FR, Outils, CTF

feeds:
  # ── CVE & Vulnérabilités ──
  - id:    "nvd-rss"
    label: "NVD (NIST)"
    theme: "CVE"
    url:   "https://nvd.nist.gov/feeds/xml/cve/misc/nvd-rss.xml"
  - id:    "cvefeed-high"
    label: "CVEFeed HIGH/CRIT"
    theme: "CVE"
    url:   "https://cvefeed.io/rssfeed/severity/high.xml"
  - id:    "cvefeed-latest"
    label: "CVEFeed Latest"
    theme: "CVE"
    url:   "https://cvefeed.io/rssfeed/latest.xml"
  - id:    "cvealert"
    label: "CVE Alert"
    theme: "CVE"
    url:   "https://cvealert.net/feeds/rss2/"
  - id:    "cert-fr"
    label: "CERT-FR (ANSSI)"
    theme: "CVE"
    url:   "https://www.cert.ssi.gouv.fr/feed/"
  - id:    "cisa-kev"
    label: "CISA KEV"
    theme: "CVE"
    url:   "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    ftype: "json_kev"
  - id:    "opencve"
    label: "OpenCVE"
    theme: "CVE"
    url:   "https://www.opencve.io/cve?format=rss"
  - id:    "cvedetails"
    label: "CVEDetails"
    theme: "CVE"
    url:   "https://www.cvedetails.com/feeds/latest/"

  # ── Exploits & PoC ──
  - id:    "exploitdb"
    label: "Exploit-DB"
    theme: "Exploit"
    url:   "https://www.exploit-db.com/rss.xml"
  - id:    "packetstorm"
    label: "Packet Storm"
    theme: "Exploit"
    url:   "https://packetstormsecurity.com/feeds"
  - id:    "full-disc"
    label: "Full Disclosure"
    theme: "Exploit"
    url:   "https://seclists.org/rss/fulldisclosure.rss"
  - id:    "sploitus"
    label: "Sploitus"
    theme: "Exploit"
    url:   "https://sploitus.com/feeds/"
  - id:    "trickest-cve"
    label: "Trickest CVE PoC"
    theme: "Exploit"
    url:   "https://raw.githubusercontent.com/trickest/cve/main/README.md"
