name: 🐛 Bug report
description: Something isn't working
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file this bug! Please fill in the
        sections below so we can reproduce it quickly.

        ⚠️ **Security issues do NOT go here** — see [SECURITY.md](../../SECURITY.md).

  - type: input
    id: version
    attributes:
      label: DHN version
      description: Output of `python3 scripts/secjournal.py --help | head -1` or the tag / commit you're running.
      placeholder: "0.5.0 / commit abc1234"
    validations: { required: true }

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Linux, Windows, Android (Termux), other]
    validations: { required: true }

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.6"
    validations: { required: true }

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: What did you do? Command line + config that triggered it.
      render: bash
    validations: { required: true }

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations: { required: true }

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior + logs
      description: Paste the traceback or `.access.log` snippet. Redact any real IPs.
      render: text
    validations: { required: true }

  - type: textarea
    id: verify-feeds
    attributes:
      label: (optional) `--verify-feeds` output
      description: Only if the bug involves fetching or missing articles.
      render: json
