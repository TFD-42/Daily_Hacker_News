name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:            [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Style is a soft gate: the source uses intentional manual column
      # alignment (feed tables, argparse blocks) that Black would collapse.
      # Reported for visibility but not build-blocking.
      - name: Ruff (lint)
        continue-on-error: true
        run: ruff check scripts tests

      - name: Black (format check)
        continue-on-error: true
        run: black --check scripts tests

      - name: Pytest (unit)
        env:
          # Skip anything that would call out to the real network
          PYTEST_ADDOPTS: -m "not network"
        run: pytest --cov=scripts --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # Basic security scan pass — SAST via bandit + secret sweep via gitleaks
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bandit SAST
        run: |
          pip install "bandit[toml]"
          bandit -r scripts -ll -q -c pyproject.toml

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Verify the built artifact loads and CLI works end-to-end (no network)
  smoke:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify feeds.yaml loads
        run: python -c "import yaml; d = yaml.safe_load(open('configs/feeds.yaml')); assert d['feeds']; print(f'✓ {len(d[\"feeds\"])} feeds loaded')"

      - name: Generate a journal (offline — no fetch, no translate)
        run: |
          python scripts/secjournal.py --no-fetch --no-translate --no-open --output html
          test -f out/journals/feed.json

      - name: Serve smoke test (background) + curl
        run: |
          python scripts/serve.py --host 127.0.0.1 --port 8765 &
          SRV=$!
          sleep 1
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 3 http://127.0.0.1:8765/feed.json)
          kill $SRV
          test "$code" = "200"
